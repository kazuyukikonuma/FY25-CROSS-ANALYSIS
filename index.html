<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FY25 交叉分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
// datalabelsプラグインをグローバル登録（全チャートに適用）
Chart.register(ChartDataLabels);
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#fdf8f4;--sur:#fffef9;--bor:#e8ddd4;--borl:#f5ede6;
  --txt:#0f172a;--sub:#475569;--dim:#94a3b8;
  --al:#7b9cc4;--ap:#c4a882;--am:#93d9f0;
  --alb:#edf3fb;--apb:#f7f0e6;--amb:#e4f6fd;
  --web:#f4a5a5;--tel:#f5e19a;--kol:#f5afd4;--ec:#c4b0f0;--oth:#c8cdd6;
  --at:#e07b6a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP','Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;}

/* ===== Sticky Header ===== */
.hd{position:sticky;top:0;z-index:100;background:var(--sur);border-bottom:2px solid var(--bor);padding:10px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex-wrap:wrap;}
.hd-title{font-size:1.1rem;font-weight:700;white-space:nowrap;}
.hd-total{font-size:1.4rem;font-weight:700;font-family:'DM Mono',monospace;color:var(--at);letter-spacing:-.03em;}
.hd-unit{font-size:.82rem;color:var(--sub);margin-left:2px;}
.hd-right{display:flex;align-items:center;gap:10px;margin-left:auto;}

.ltog{display:flex;border:2px solid var(--bor);border-radius:8px;overflow:hidden;}
.lbtn{background:none;border:none;padding:6px 13px;font-size:.8rem;font-family:inherit;font-weight:500;cursor:pointer;color:var(--sub);}
.lbtn.on{background:var(--txt);color:#fff;}

/* ===== KPI strip ===== */
.kstrip{display:flex;gap:8px;padding:14px 24px;overflow-x:auto;background:var(--sur);border-bottom:1px solid var(--borl);}
.kcard{background:var(--bg);border:1.5px solid var(--bor);border-radius:10px;padding:10px 14px;min-width:110px;flex-shrink:0;cursor:pointer;transition:all .15s;user-select:none;}
.kcard:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08);}
.kcard.selected{border-width:2.5px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.sparkline{display:block;margin-top:6px;width:100%;height:32px;}
.kcard.sep{width:1px;min-width:1px;background:var(--bor);padding:0;border:none;border-radius:0;}
.klbl{font-size:.72rem;font-weight:600;color:var(--sub);margin-bottom:4px;white-space:nowrap;}
.kval{font-size:1.1rem;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.02em;}
.kpct{font-size:.72rem;color:var(--sub);margin-top:2px;}

/* ===== Main area ===== */
.main{padding:20px 24px;max-width:1400px;margin:0 auto;}
body.chat-open .main{padding-right:20px;}

/* ===== Filter panel ===== */
.filter-card{background:var(--sur);border:2px solid var(--bor);border-radius:14px;padding:18px 22px;margin-bottom:16px;}
.filter-title{font-size:.82rem;font-weight:700;color:var(--sub);letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px;}
.filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.fsel{padding:8px 14px;border:1.5px solid var(--bor);border-radius:8px;font-family:inherit;font-size:.88rem;color:var(--txt);background:var(--sur);cursor:pointer;min-width:140px;}
.fsel:focus{outline:none;border-color:var(--al);}
.fadd{padding:8px 18px;background:var(--txt);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;}
.fadd:hover{opacity:.88;}
.fclr{padding:8px 14px;background:none;color:var(--sub);border:1.5px solid var(--bor);border-radius:8px;font-family:inherit;font-size:.88rem;cursor:pointer;}
.ftags{display:flex;flex-wrap:wrap;gap:7px;min-height:22px;}
.ftag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:.82rem;font-weight:600;}
.ftag button{background:none;border:none;cursor:pointer;font-size:.95rem;line-height:1;opacity:.65;}
.ftag button:hover{opacity:1;}
.hint{font-size:.78rem;color:var(--dim);margin-top:6px;}

/* ===== Chart card ===== */
.cross-table-card{background:var(--sur);border:2px solid var(--bor);border-radius:14px;padding:20px 22px;margin-bottom:16px;}
.ct-title{font-size:.86rem;font-weight:700;color:var(--txt);margin-bottom:14px;}
.ct-wrap{overflow-x:auto;}
table.ct{width:100%;border-collapse:collapse;font-size:.82rem;}
table.ct th{padding:8px 12px;border:1px solid var(--bor);background:var(--bg);font-weight:700;text-align:center;font-size:.78rem;white-space:nowrap;}
table.ct th:first-child{text-align:left;}
table.ct td{padding:8px 12px;border:1px solid var(--borl);text-align:right;font-family:'DM Mono',monospace;font-size:.82rem;font-weight:600;white-space:nowrap;}
table.ct td:first-child{text-align:left;font-family:'Noto Sans JP','Noto Sans TC',sans-serif;font-weight:600;}
table.ct .tr-total td{font-weight:700;border-top:2px solid var(--bor);background:var(--bg);}
table.ct .pct{font-size:.72rem;color:var(--sub);font-weight:400;display:block;}
.chart-card{background:var(--sur);border:2px solid var(--bor);border-radius:14px;padding:20px 22px;}
.chart-title{font-size:.86rem;font-weight:700;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.chart-badge{font-size:.7rem;background:var(--alb);color:var(--al);padding:2px 8px;border-radius:12px;font-weight:600;}
.cw{position:relative;height:420px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:420px;color:var(--dim);gap:12px;}
.empty-icon{font-size:3rem;opacity:.4;}
.empty-txt{font-size:.92rem;}

/* ===== Chat Panel ===== */
.chat-toggle{position:fixed;right:16px;bottom:20px;z-index:200;width:68px;height:68px;border-radius:50%;background:transparent;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:0;overflow:hidden;transition:transform .2s;}
.chat-toggle:hover{transform:scale(1.08);}
.chat-toggle img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.chat-panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:#e8f4fd;border-left:2px solid #b8d4ed;z-index:150;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;box-shadow:-4px 0 20px rgba(0,0,0,.08);}
.chat-panel.open{transform:translateX(0);}
body.chat-open{padding-right:340px;transition:padding-right .3s ease;}
body.chat-open .hd{right:340px;transition:right .3s ease;}
.chat-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #b8d4ed;background:#c8e3f5;}
.chat-hd-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px;color:#1e3a5f;}
.chat-hd-badge{font-size:.65rem;background:#f5afd4;color:#1a202c;padding:2px 8px;border-radius:20px;font-weight:700;}
.chat-ctx{font-size:.72rem;color:#4a7090;padding:8px 14px;background:#d4eaf7;border-bottom:1px solid #b8d4ed;line-height:1.5;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#eef6fc;}
.chat-msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:.83rem;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.chat-msg.user{background:#7b9cc4;color:#fff;align-self:flex-end;}
.chat-msg.ai{background:#fff;color:#1e3a5f;border:1px solid #b8d4ed;align-self:flex-start;}
.chat-msg.thinking{color:#7ba8c4;font-style:italic;align-self:flex-start;}
.chat-input-area{padding:14px;border-top:1px solid #b8d4ed;background:#c8e3f5;display:flex;gap:8px;align-items:flex-end;}
.chat-input{flex:1;padding:9px 12px;border:1.5px solid #b8d4ed;border-radius:8px;font-family:inherit;font-size:.83rem;resize:none;min-height:80px;max-height:160px;outline:none;background:#fff;color:#1e3a5f;}
.chat-input:focus{border-color:#7b9cc4;}
.chat-input::placeholder{color:#99bbcc;}
.chat-send{padding:9px 14px;background:#7b9cc4;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;}
.chat-send:hover{background:#6b8cb4;}
.chat-send:disabled{opacity:.4;cursor:not-allowed;}
.chat-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:#4a7090;padding:2px 6px;}
.chat-clear{background:none;border:1px solid #b8d4ed;border-radius:6px;font-size:.72rem;color:#4a7090;padding:3px 8px;cursor:pointer;}

.chart-type-sw{display:flex;border:1.5px solid var(--bor);border-radius:8px;overflow:hidden;}
.ctbtn{background:none;border:none;padding:6px 14px;font-size:.82rem;font-family:inherit;font-weight:600;cursor:pointer;color:var(--sub);}
.ctbtn.on{background:var(--txt);color:#fff;}
.comp-section{background:var(--sur);border:2px solid var(--bor);border-radius:14px;padding:20px 22px;margin-bottom:16px;}
.comp-title{font-size:.86rem;font-weight:700;color:var(--txt);margin-bottom:16px;}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.comp-card{background:var(--bg);border:1.5px solid var(--bor);border-radius:10px;padding:14px;}
.comp-card-title{font-size:.78rem;font-weight:700;color:var(--sub);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.comp-sel-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.comp-sel-btn{padding:5px 12px;border:1.5px solid var(--bor);border-radius:20px;font-size:.78rem;font-family:inherit;font-weight:600;cursor:pointer;background:var(--sur);color:var(--sub);transition:all .15s;}
.comp-sel-btn.active{color:#fff;border-color:transparent;}
.comp-donut-wrap{position:relative;height:200px;}
.bar100-wrap{overflow-x:auto;}
table.bar100{width:100%;border-collapse:collapse;}
table.bar100 td{padding:5px 8px;vertical-align:middle;}
table.bar100 .row-lbl{font-size:.8rem;font-weight:700;white-space:nowrap;width:80px;color:var(--txt);}
table.bar100 .row-bar{width:100%;}
table.bar100 .row-pct{font-size:.75rem;font-family:'DM Mono',monospace;font-weight:600;white-space:nowrap;width:50px;text-align:right;color:var(--sub);}
.bar-track{height:28px;border-radius:4px;overflow:hidden;display:flex;background:var(--borl);}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;transition:width .4s ease;min-width:0;}
.bar-seg:hover{opacity:.85;cursor:pointer;}
@media(max-width:900px){.comp-grid{grid-template-columns:1fr;}}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--sub);gap:10px;}
.spin{width:22px;height:22px;border:3px solid var(--bor);border-top-color:var(--at);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.err{color:var(--at);text-align:center;padding:40px;}
</style>
</head>
<body>

<!-- Header -->
<div class="hd">
  <div class="hd-title" id="h-title">FY25 交叉分析</div>
  <div><span class="hd-total" id="h-total">—</span><span class="hd-unit" id="h-unit">萬元</span></div>
  <div class="hd-right">
    <div class="ltog">
      <button class="lbtn" onclick="setLang('ja')">日本語</button>
      <button class="lbtn on" onclick="setLang('zh')">繁中</button>
    </div>
  </div>
</div>

<!-- KPI Strip -->
<div class="kstrip" id="kstrip"></div>

<!-- Main -->
<div class="main" id="main">
  <div class="loading"><div class="spin"></div><span>載入資料中…</span></div>
</div>

<!-- Chat -->
<button class="chat-toggle" id="chat-btn" title="AI分析助理"><img src="AIC.jpg" alt="AI"></button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-hd">
    <div class="chat-hd-title"><span id="chat-hd-txt">AI 分析助理</span><span class="chat-hd-badge">Claude</span></div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="chat-clear" id="chat-clear-btn">清除</button>
      <button class="chat-close" id="chat-close-btn">✕</button>
    </div>
  </div>
  <div class="chat-ctx" id="chat-ctx">資料讀取中…</div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="chat-msg ai" id="chat-init-msg">您好！請隨時詢問FY25銷售數據相關問題。</div>
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chat-input" placeholder="例：TEL在8月為何急增？" rows="3"></textarea>
    <button class="chat-send" id="chat-send-btn">傳送</button>
  </div>
</div>

<script>
// ===== 定数 =====
var MONTHS = ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月'];
var QUARTERS = [
  {key:'Q1',months:['4月','5月','6月']},
  {key:'Q2',months:['7月','8月','9月']},
  {key:'Q3',months:['10月','11月','12月']},
  {key:'Q4',months:['1月','2月','3月']}
];
var CATS = ['學習','周邊','Mirafeel'];
var CCOLORS = {'學習':'#7b9cc4','周邊':'#c4a882','Mirafeel':'#93d9f0'};
var CH_GROUPS = [
  {key:'WEB',channels:['官網'],color:'#f4a5a5'},
  {key:'TEL',channels:['電銷'],color:'#e8c840'},
  {key:'KOL',channels:['團購'],color:'#f5afd4'},
  {key:'EC', channels:['蝦皮'],color:'#c4b0f0'},
  {key:'その他',channels:['經代銷','其他'],color:'#c8cdd6'}
];
var SERIES_COLORS = ['#7b9cc4','#c4a882','#93d9f0','#f4a5a5','#e8c840','#f5afd4','#c4b0f0','#e07b6a','#6b9e6b','#c8cdd6'];

var I18N = {
  ja:{title:'FY25 クロス分析',unit:'万元',total:'合計',cat:'商品群',ch:'通路',
    pY:'年度',pM:'月次',pQ:'季別',crossall:'全て',
    addBtn:'＋ 系列追加',clrBtn:'全消去',
    hint:'商品群と通路を選んで追加してください。複数の組み合わせを重ねて比較できます。',
    compTitle:'構成比分析',compCat:'商品群別構成比',compCh:'通路別構成比',compSel:'クリックして選択',
    ctLine:'折れ線',ctBar:'積み上げ棒',
    emptyTxt:'系列を追加してグラフを表示',
    chartTitle:'絞り込み比較グラフ',
    chatHd:'AI 分析アシスタント',chatCtx:'表示中：',chatInit:'こんにちは！FY25の売上データについて何でも聞いてください。',
    send:'送信',clear:'クリア',
    names:{'學習':'学習','周邊':'周邊','Mirafeel':'Mirafeel'},
    chnames:{'WEB':'WEB','TEL':'TEL','KOL':'KOL','EC':'EC','その他':'その他'}},
  zh:{title:'FY25 交叉分析',unit:'萬元',total:'合計',cat:'商品群',ch:'通路',
    pY:'年度',pM:'月次',pQ:'季別',crossall:'全部',
    addBtn:'＋ 新增系列',clrBtn:'清除全部',
    hint:'選擇商品群和通路後新增，可重疊多組進行比較。',
    compTitle:'構成比分析',compCat:'商品群構成比',compCh:'通路構成比',compSel:'點擊選擇',
    ctLine:'折線圖',ctBar:'堆疊長條',
    emptyTxt:'新增系列以顯示圖表',
    chartTitle:'篩選比較圖',
    chatHd:'AI 分析助理',chatCtx:'顯示中：',chatInit:'您好！請隨時詢問FY25銷售數據相關問題。',
    send:'傳送',clear:'清除',
    names:{'學習':'學習','周邊':'周邊','Mirafeel':'Mirafeel'},
    chnames:{'WEB':'WEB','TEL':'TEL','KOL':'KOL','EC':'EC','その他':'其他'}}
};

var lang='zh', period='y', chartType='line';
var globalRows=null, byCat={}, byGrp={};
var seriesList=[];
var chartInst=null;
var chatOpen=false, chatHistory=[];

function t(k){ return I18N[lang][k]; }
function cn(c){ return I18N[lang].names[c]||c; }
function cg(g){ return I18N[lang].chnames[g]||g; }
function fw(n){ return (n/10000).toFixed(1); }

// ===== CSV parse =====
function parseCSV(text){
  var lines=text.trim().split('\n'), hdr=lines[0].split(',');
  return lines.slice(1).map(function(line){
    var v=line.split(','), o={};
    hdr.forEach(function(h,i){ var s=(v[i]||'').trim(); o[h.trim()]=(s!==''&&!isNaN(s))?Number(s):s; });
    return o;
  });
}

// ===== Aggregate =====
function buildAgg(){
  byCat={};
  CATS.forEach(function(c){ byCat[c]={}; MONTHS.forEach(function(m){ byCat[c][m]=0; }); });
  byGrp={};
  CH_GROUPS.forEach(function(g){ byGrp[g.key]={}; MONTHS.forEach(function(m){ byGrp[g.key][m]=0; }); });
  globalRows.forEach(function(row){
    if(byCat[row.category]) MONTHS.forEach(function(m){ byCat[row.category][m]+=(row[m]||0); });
    CH_GROUPS.forEach(function(g){
      if(g.channels.indexOf(row.channel)>=0) MONTHS.forEach(function(m){ byGrp[g.key][m]+=(row[m]||0); });
    });
  });
}

// ===== Period helpers =====
function getPList(){ return period==='q'?QUARTERS.map(function(q){return q.key;}):MONTHS; }
function getPLabel(){ return t(period==='y'?'pY':period==='m'?'pM':'pQ'); }
function sumForPeriod(monthMap, pkey){
  if(period==='q'){
    var q=QUARTERS.filter(function(qq){return qq.key===pkey;})[0];
    return q?q.months.reduce(function(s,m){return s+(monthMap[m]||0);},0):0;
  }
  return monthMap[pkey]||0;
}

// ===== Series data =====
function getSeriesData(cat, grp){
  if(!globalRows) return getPList().map(function(){return 0;});
  var rows=globalRows.filter(function(r){
    var catOk=!cat||r.category===cat;
    var grpOk=!grp;
    if(grp){ var g=CH_GROUPS.filter(function(gg){return gg.key===grp;})[0]; grpOk=g&&g.channels.indexOf(r.channel)>=0; }
    return catOk&&grpOk;
  });
  return getPList().map(function(pkey){
    if(period==='q'){
      var q=QUARTERS.filter(function(qq){return qq.key===pkey;})[0];
      return q?parseFloat((rows.reduce(function(s,r){return s+q.months.reduce(function(ss,m){return ss+(r[m]||0);},0);},0)/10000).toFixed(1)):0;
    }
    return parseFloat((rows.reduce(function(s,r){return s+(r[pkey]||0);},0)/10000).toFixed(1));
  });
}

// ===== Sparkline =====
var _sparkCharts = {};
function drawSparkline(id, data, color){
  var canvas = document.getElementById(id); if(!canvas) return;
  var key = id;
  if(_sparkCharts[key]){ _sparkCharts[key].destroy(); }
  _sparkCharts[key] = new Chart(canvas, {
    type:'line',
    data:{
      labels: MONTHS,
      datasets:[{
        data: data.map(function(v){return parseFloat((v/10000).toFixed(1));}),
        borderColor: color,
        borderWidth: 1.5,
        pointRadius: 2,
        pointBackgroundColor: color,
        tension: 0.4,
        fill: true,
        backgroundColor: color+'22',
        datalabels:{display:false}
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false,
      plugins:{legend:{display:false},tooltip:{enabled:false},datalabels:{display:false}},
      scales:{x:{display:false},y:{display:false}}
    }
  });
}

// ===== Grand total =====
function getGrand(){
  return CATS.reduce(function(s,c){ return s+MONTHS.reduce(function(ss,m){return ss+(byCat[c]?byCat[c][m]||0:0);},0); },0);
}

// ===== KPI strip =====
function renderKPI(){
  var grand=getGrand();
  var html='';
  // 合計
  html+='<div class="kcard" style="border-color:var(--at);" onclick="addPreset(\'\',\'\')">'
    +'<div class="klbl">'+t('total')+'</div>'
    +'<div class="kval" style="color:var(--at)">'+fw(grand)+'</div>'
    +'<div class="kpct">100%</div></div>';
  html+='<div class="kcard sep"></div>';
  // 商品群
  CATS.forEach(function(c){
    var v=MONTHS.reduce(function(s,m){return s+(byCat[c]?byCat[c][m]||0:0);},0);
    html+='<div class="kcard" style="border-color:'+CCOLORS[c]+';" onclick="addPreset(\''+c+'\',\'\')">'
      +'<div class="klbl">'+cn(c)+'</div>'

function addSeries(){
  var cat=document.getElementById('sel-cat').value;
  var grp=document.getElementById('sel-grp').value;
  _addSeries(cat, grp);
}

function addPreset(cat, grp){
  _addSeries(cat, grp);
}

function _addSeries(cat, grp){
  var catLabel=cat?cn(cat):t('crossall');
  var grpLabel=grp?cg(grp):t('crossall');
  var label=catLabel+' × '+grpLabel;
  if(seriesList.filter(function(s){return s.cat===cat&&s.grp===grp;}).length) return;
  var color=SERIES_COLORS[seriesList.length%SERIES_COLORS.length];
  seriesList.push({cat:cat,grp:grp,label:label,color:color});
  renderTags();
  renderChart();
}

function rmSeries(idx){
  seriesList.splice(idx,1);
  renderTags();
  renderChart();
}

function clrSeries(){
  seriesList=[];
  renderTags();
  renderChart();
}

// ===== Chart =====
function renderChart(){
  var canvas=document.getElementById('main-chart');
  var empty=document.getElementById('empty-state');
  if(!canvas||!empty) return;
  if(!seriesList.length){
    canvas.style.display='none'; empty.style.display='flex'; return;
  }
  canvas.style.display='block'; empty.style.display='none';
  if(chartInst){ chartInst.destroy(); chartInst=null; }
  var unit=lang==='zh'?' 萬':' 万';
  var pList=getPList();
  var isBar = chartType==='bar';
  var datasets = seriesList.map(function(s){
    var d = {label:s.label, data:getSeriesData(s.cat,s.grp), backgroundColor:s.color+'cc', borderColor:s.color, borderWidth:isBar?0:2.5};
    if(!isBar){ d.pointRadius=5; d.pointHoverRadius=8; d.pointBackgroundColor=s.color; d.tension=0.3; d.fill=false; }
    else { d.borderRadius=3; }
    return d;
  });
  chartInst=new Chart(canvas,{
    type:isBar?'bar':'line',
    data:{labels:pList,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'top',labels:{color:'#0f172a',font:{size:13,weight:'600'},padding:16,usePointStyle:true}},
        tooltip:{backgroundColor:'rgba(15,23,42,.9)',titleColor:'#f8fafc',bodyColor:'#e2e8f0',padding:12,callbacks:{
          label:function(ctx){ return ' '+ctx.dataset.label+': '+ctx.parsed.y+unit; }
        }},
        datalabels:{
          display:function(ctx){
            var data=ctx.dataset.data;
            var i=ctx.dataIndex;
            // 隣接する値と差が小さい場合は間引き（全12点を表示すると重なるため）
            if(i>0 && i<data.length-1){
              var diff1=Math.abs(data[i]-data[i-1]);
              var diff2=Math.abs(data[i]-data[i+1]);
              var range=Math.max.apply(null,data)-Math.min.apply(null,data);
              if(range>0 && diff1/range<0.08 && diff2/range<0.08) return false;
            }
            return true;
          },
          color:function(ctx){ return ctx.dataset.borderColor; },
          backgroundColor:'rgba(255,255,255,0.85)',
          borderRadius:3,
          padding:{top:2,bottom:2,left:4,right:4},
          font:{size:10,weight:'700'},
          formatter:function(v){ return v; },
          anchor:'end',
          align:'top',
          offset:4,
          clamp:true
        }
      },
      scales:{
        x:{stacked:isBar,ticks:{color:'#0f172a',font:{size:12,weight:'600'}},grid:{color:'#f0ece8'}},
        y:{stacked:isBar,ticks:{color:'#0f172a',font:{size:12,weight:'600'},callback:function(v){return v+unit;}},
          grid:{color:'#f0ece8'}}
      }
    }
  });
  // badge更新
  var badge=document.getElementById('chart-badge');
  if(badge) badge.textContent=getPLabel();
}

function drawDonutLabels(chart, rawData, labels){
  var ctx = chart.ctx;
  var meta = chart.getDatasetMeta(0);
  var total = rawData.reduce(function(a,b){return a+b;},0);
  if(!total) return;
  ctx.save();
  meta.data.forEach(function(arc, i){
    var val = rawData[i];
    var pct = val/total*100;
    if(pct < 5) return; // 5%未満は省略
    var angle = (arc.startAngle + arc.endAngle) / 2;
    var r = (arc.innerRadius + arc.outerRadius) / 2;
    var x = arc.x + Math.cos(angle) * r;
    var y = arc.y + Math.sin(angle) * r;
    ctx.font = 'bold 11px DM Mono,monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pct.toFixed(1)+'%', x, y);
  });
  ctx.restore();
}

function getMatData(){
  var mat={};
  CATS.forEach(function(c){ mat[c]={}; CH_GROUPS.forEach(function(g){ mat[c][g.key]=0; }); });
  globalRows.forEach(function(row){
    CH_GROUPS.forEach(function(g){
      if(g.channels.indexOf(row.channel)>=0){
        if(mat[row.category]) mat[row.category][g.key]+=MONTHS.reduce(function(s,m){return s+(row[m]||0);},0);
      }
    });
  });
  return mat;
}

function renderCrossTable(){
  var wrap=document.getElementById('cross-table-wrap'); if(!wrap||!globalRows) return;
  // 商品群×通路グループのクロス集計
  var mat={};
  CATS.forEach(function(c){ mat[c]={}; CH_GROUPS.forEach(function(g){ mat[c][g.key]=0; }); });
  globalRows.forEach(function(row){
    CH_GROUPS.forEach(function(g){
      if(g.channels.indexOf(row.channel)>=0){
        if(mat[row.category]) mat[row.category][g.key]+=MONTHS.reduce(function(s,m){return s+(row[m]||0);},0);
      }
    });
  });
  var grand=getGrand();
  // 最大値（ヒートマップ用）
  var maxV=0;
  CATS.forEach(function(c){ CH_GROUPS.forEach(function(g){ if(mat[c][g.key]>maxV) maxV=mat[c][g.key]; }); });
  function hbg(v){
    if(!v||!maxV) return '';
    var r=v/maxV;
    var alpha=Math.round(r*60+10);
    return 'background:rgba(123,156,196,'+alpha/100+');';
  }
  var html='<div class="ct-title" id="ct-title">'+t('cat')+' × '+t('ch')+'</div><div class="ct-wrap"><table class="ct">';
  // ヘッダー
  html+='<thead><tr><th>'+t('cat')+'</th>';
  CH_GROUPS.forEach(function(g){ html+='<th style="color:'+g.color+'">'+cg(g.key)+'</th>'; });
  html+='<th>'+t('total')+'</th></tr></thead><tbody>';
  // 行
  CATS.forEach(function(c){
    var rowTot=CH_GROUPS.reduce(function(s,g){return s+mat[c][g.key];},0);
    html+='<tr><td><span style="color:'+CCOLORS[c]+';font-weight:700;">'+cn(c)+'</span></td>';
    CH_GROUPS.forEach(function(g){
      var v=mat[c][g.key];
      html+='<td style="'+hbg(v)+'">'+fw(v)+'<span class="pct">'+((v/grand)*100).toFixed(1)+'%</span></td>';
    });
    html+='<td><strong>'+fw(rowTot)+'</strong><span class="pct">'+((rowTot/grand)*100).toFixed(1)+'%</span></td></tr>';
  });
  // 合計行
  html+='<tr class="tr-total"><td>'+t('total')+'</td>';
  CH_GROUPS.forEach(function(g){
    var v=CATS.reduce(function(s,c){return s+mat[c][g.key];},0);
    html+='<td>'+fw(v)+'<span class="pct">'+((v/grand)*100).toFixed(1)+'%</span></td>';
  });
  html+='<td>'+fw(grand)+'<span class="pct">100%</span></td></tr>';
  html+='</tbody></table></div>';
  wrap.innerHTML=html;
}

  var pl=getPLabel();
  var grand=getGrand();
  var parts=['あなたはベネッセ台湾支社FY25売上アナリストです。日本語で簡潔に答えてください。マークダウン記号は使わずプレーンテキストで回答してください。'];
  parts.push('粒度:'+pl);
  parts.push('年間合計:'+(grand/10000).toFixed(1)+'万元');
  CATS.forEach(function(c){ var v=MONTHS.reduce(function(s,m){return s+(byCat[c]?byCat[c][m]||0:0);},0); parts.push(cn(c)+':'+(v/10000).toFixed(1)+'万元('+(v/grand*100).toFixed(1)+'%)'); });
  CH_GROUPS.forEach(function(g){ var v=MONTHS.reduce(function(s,m){return s+(byGrp[g.key]?byGrp[g.key][m]||0:0);},0); parts.push(g.key+':'+(v/10000).toFixed(1)+'万元('+(v/grand*100).toFixed(1)+'%)'); });
  if(period!=='q'){
    MONTHS.forEach(function(m){ var v=CATS.reduce(function(s,c){return s+(byCat[c]?byCat[c][m]||0:0);},0); parts.push(m+(v/10000).toFixed(1)); });
  } else {
    QUARTERS.forEach(function(q){ var v=CATS.reduce(function(s,c){return s+(byCat[c]?q.months.reduce(function(ss,mm){return ss+(byCat[c][mm]||0);},0):0);},0); parts.push(q.key+(v/10000).toFixed(1)+'万元'); });
  }
  if(seriesList.length){
    parts.push('現在表示中の系列:');
    seriesList.forEach(function(s){ parts.push(s.label); });
  }
  return parts.join(' | ');
}

function _addMsg(role,text,cls){
  var box=document.getElementById('chat-msgs');
  var el=document.createElement('div');
  el.className='chat-msg '+role+(cls?' '+cls:'');
  el.textContent=text;
  box.appendChild(el);
  box.scrollTop=box.scrollHeight;
  return el;
}

async function _sendChat(){
  var inp=document.getElementById('chat-input');
  var msg=inp.value.trim(); if(!msg) return;
  _addMsg('user',msg);
  inp.value=''; inp.style.height='auto';
  var sendBtn=document.getElementById('chat-send-btn');
  sendBtn.disabled=true;
  var thinking=_addMsg('ai','考え中…','thinking');
  chatHistory.push({role:'user',content:msg});
  try{
    var res=await fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistory,systemPrompt:_buildPrompt()})});
    var data=await res.json();
    thinking.remove();
    if(data.error){ _addMsg('ai','エラー: '+data.error); }
    else{ _addMsg('ai',data.content); chatHistory.push({role:'assistant',content:data.content}); if(chatHistory.length>20) chatHistory=chatHistory.slice(-20); }
  }catch(e){ thinking.remove(); _addMsg('ai','通信エラー: '+e.message); }
  sendBtn.disabled=false;
}

function _clearChat(){ chatHistory=[]; document.getElementById('chat-msgs').innerHTML='<div class="chat-msg ai" id="chat-init-msg">'+t('chatInit')+'</div>'; }

// ===== Boot =====
window.addEventListener('load',function(){
  var btn=document.getElementById('chat-btn');
  var closeBtn=document.getElementById('chat-close-btn');
  var clearBtn=document.getElementById('chat-clear-btn');
  var sendBtn=document.getElementById('chat-send-btn');
  var inp=document.getElementById('chat-input');
  if(btn) btn.addEventListener('click',_toggleChat);
  if(closeBtn) closeBtn.addEventListener('click',_toggleChat);
  if(clearBtn) clearBtn.addEventListener('click',_clearChat);
  if(sendBtn) sendBtn.addEventListener('click',_sendChat);
  if(inp){
    inp.addEventListener('input',function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,160)+'px'; });
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();_sendChat();} });
  }
});

fetch('data.csv?t='+Date.now())
  .then(function(r){ if(!r.ok) throw new Error('CSV讀取失敗'); return r.text(); })
  .then(function(text){
    globalRows=parseCSV(text);
    buildAgg();
    var grand=getGrand();
    document.getElementById('h-title').textContent=t('title');
    document.getElementById('h-total').textContent=fw(grand);
    document.getElementById('h-unit').textContent=t('unit');
    renderKPI();
    renderMain();
  })
  .catch(function(err){ document.getElementById('main').innerHTML='<div class="err">⚠️ '+err.message+'</div>'; });
</script>
